name: CI

on:
  pull_request:
    branches:
      - main
      - develop
      - 'release/v*.*.*'
  push:
    branches:
      - main
      - develop
      - 'release/v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run verify

      - name: Build project
        run: npm run build
